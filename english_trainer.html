<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EN Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f12;
  --surface: #17171d;
  --surface2: #1e1e27;
  --surface3: #252530;
  --border: #2c2c3a;
  --border2: #3a3a4a;
  --accent: #a8ff57;
  --accent-dim: rgba(168,255,87,0.12);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.12);
  --yellow: #ffc542;
  --yellow-dim: rgba(255,197,66,0.12);
  --blue: #5bc0ff;
  --blue-dim: rgba(91,192,255,0.12);
  --text: #e4e4ee;
  --text-muted: #5a5a72;
  --text-dim: #8888a8;
  --font-jp: 'Noto Sans JP', sans-serif;
  --font-en: 'Noto Sans', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-jp);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ══════════════════════════════
   VIEWS
══════════════════════════════ */
.view { display: none; flex-direction: column; min-height: 100vh; }
.view.active { display: flex; }

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}

.header-logo {
  font-family: var(--font-en);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--accent);
}

.header-actions { display: flex; gap: 8px; align-items: center; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--border2); color: var(--text); }

.header-stats {
  display: flex; gap: 12px; align-items: center;
}

.hstat {
  display: flex; flex-direction: column; align-items: center;
  font-family: var(--font-en);
}
.hstat-val { font-size: 15px; font-weight: 600; line-height: 1; }
.hstat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; margin-top: 1px; }
.hstat.ok .hstat-val { color: var(--accent); }
.hstat.ng .hstat-val { color: var(--red); }
.hstat.streak .hstat-val { color: var(--yellow); }

/* ══════════════════════════════
   HOME VIEW
══════════════════════════════ */
#homeView { background: var(--bg); }

.home-top {
  padding: 20px 16px 12px;
  display: flex; flex-direction: column; gap: 12px;
}

/* Overall progress bar */
.overall-progress {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}

.op-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.op-title { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; font-family: var(--font-en); font-weight: 500; }
.op-count { font-size: 11px; color: var(--text-dim); font-family: var(--font-en); }

.op-bar-bg {
  height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden;
  margin-bottom: 8px;
}
.op-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #7dff33);
  border-radius: 3px;
  transition: width 0.5s ease;
}

.op-legend {
  display: flex; gap: 12px;
}
.legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--text-muted); font-family: var(--font-en);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-dot.ok { background: var(--accent); }
.legend-dot.close { background: var(--yellow); }
.legend-dot.ng { background: var(--red); }
.legend-dot.todo { background: var(--surface3); border: 1px solid var(--border2); }

/* Filter & Start bar */
.home-controls {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}

.filter-chip {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-en);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.filter-chip:hover { border-color: var(--border2); color: var(--text); }
.filter-chip.on-all { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filter-chip.on-anime { border-color: #ff9de2; color: #ff9de2; background: rgba(255,157,226,0.1); }
.filter-chip.on-biz { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

.review-chip {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--red);
  background: var(--red-dim);
  color: var(--red);
  font-family: var(--font-en);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
  margin-left: auto;
}
.review-chip:hover { background: rgba(255,95,95,0.2); }
.review-chip.disabled { opacity: 0.35; pointer-events: none; }

/* Start buttons */
.start-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

.start-btn {
  padding: 16px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-jp);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.start-btn .start-icon { font-size: 24px; }
.start-btn .start-sub { font-size: 10px; color: var(--text-muted); font-family: var(--font-en); letter-spacing: 0.5px; }
.start-btn.primary { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.start-btn.primary .start-sub { color: var(--accent); opacity: 0.7; }
.start-btn.primary:hover { background: rgba(168,255,87,0.2); }
.start-btn.resume-btn-home { border-color: var(--yellow); background: var(--yellow-dim); color: var(--yellow); }
.start-btn.resume-btn-home .start-sub { color: var(--yellow); opacity: 0.7; }
.start-btn.resume-btn-home:hover { background: rgba(255,197,66,0.2); }
.start-btn:not(.primary):not(.resume-btn-home):hover { border-color: var(--border2); background: var(--surface2); }

/* Question list */
.section-header {
  padding: 0 16px 8px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  font-family: var(--font-en);
  font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.section-count {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 10px;
}

.q-list {
  padding: 0 16px 32px;
  display: flex; flex-direction: column; gap: 4px;
}

.q-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
}

.q-row:hover { border-color: var(--border2); background: var(--surface2); }

.q-row::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.q-row.status-ok::before { background: var(--accent); }
.q-row.status-close::before { background: var(--yellow); }
.q-row.status-ng::before { background: var(--red); }
.q-row.status-todo::before { background: var(--border); }

.q-num {
  font-family: var(--font-en);
  font-size: 10px;
  color: var(--text-muted);
  min-width: 26px;
  text-align: right;
}

.q-theme-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.dot-anime { background: #ff9de2; }
.dot-biz { background: var(--blue); }

.q-ja {
  font-size: 13px;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--font-jp);
}

.q-badge {
  font-family: var(--font-en);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.badge-ok { background: var(--accent-dim); color: var(--accent); }
.badge-close { background: var(--yellow-dim); color: var(--yellow); }
.badge-ng { background: var(--red-dim); color: var(--red); }
.badge-todo { color: var(--border2); font-size: 10px; }

/* ══════════════════════════════
   TRAINING VIEW
══════════════════════════════ */
#trainView { background: var(--bg); }

.train-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}

.home-back-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.home-back-btn:hover { border-color: var(--border2); color: var(--text); }

.train-progress-wrap { flex: 1; }
.train-progress-bar-bg {
  height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px;
}
.train-progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #7dff33);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.train-progress-text {
  font-family: var(--font-en);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.train-session-stats {
  display: flex; gap: 8px; align-items: center;
}

.tsstat {
  display: flex; flex-direction: column; align-items: center;
  font-family: var(--font-en); font-size: 9px; color: var(--text-muted);
  gap: 1px;
}
.tsstat-val { font-size: 13px; font-weight: 600; line-height: 1; }
.tsstat.ok .tsstat-val { color: var(--accent); }
.tsstat.ng .tsstat-val { color: var(--red); }

/* Main train area */
.train-body {
  flex: 1;
  padding: 16px 14px 100px;
  display: flex; flex-direction: column; gap: 12px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* Question card */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-card-tag {
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-en);
  font-size: 10px;
  letter-spacing: 1px;
  font-weight: 500;
}

.tag-anime { color: #ff9de2; }
.tag-biz { color: var(--blue); }
.tag-sub { margin-left: auto; color: var(--text-muted); font-size: 9px; font-weight: 400; }

.q-card-body { padding: 22px 16px 18px; }

.q-ja-main {
  font-family: var(--font-jp);
  font-size: 21px;
  font-weight: 400;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 6px;
  word-break: break-all;
}

.q-ja-speak-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 15px; padding: 2px 4px;
  transition: color 0.15s; border-radius: 4px;
  vertical-align: middle; margin-left: 4px;
}
.q-ja-speak-btn:hover { color: var(--accent); }

/* Mic */
.mic-area {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 18px 0 6px;
}

.mic-btn {
  width: 68px; height: 68px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.mic-btn:hover { border-color: var(--accent); color: var(--accent); }
.mic-btn.rec { border-color: var(--red); color: var(--red); animation: ripple 1s infinite; }

@keyframes ripple {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,95,95,0.35); }
  50% { box-shadow: 0 0 0 10px rgba(255,95,95,0); }
}

.mic-hint {
  font-family: var(--font-en);
  font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px;
}

.transcript {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-family: var(--font-en);
  font-size: 14px; line-height: 1.6;
  color: var(--text);
  display: none;
  min-height: 42px;
}
.transcript.show { display: block; }

/* Reveal btn */
.reveal-btn {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: var(--font-jp);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.reveal-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Answer card */
.answer-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: none;
  animation: slideUp 0.2s ease;
}
.answer-card.show { display: block; }

.answer-top {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  background: rgba(168,255,87,0.04);
}
.answer-top-label {
  font-family: var(--font-en);
  font-size: 10px; letter-spacing: 1.5px; font-weight: 600;
  color: var(--accent);
}
.en-speak-btn {
  margin-left: auto;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px;
  padding: 3px 6px; border-radius: 6px;
  transition: color 0.15s;
}
.en-speak-btn:hover { color: var(--accent); }

.answer-body { padding: 18px 16px; }

.en-text {
  font-family: var(--font-en);
  font-size: 17px; font-weight: 400;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 18px;
}

/* Score buttons */
.score-row { display: flex; gap: 8px; }

.score-btn {
  flex: 1; padding: 13px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: var(--font-jp);
  font-size: 11px;
  transition: all 0.15s;
}
.score-btn .score-icon { font-size: 22px; }
.score-btn.ok-btn { color: var(--accent); border-color: var(--accent); }
.score-btn.ok-btn:hover, .score-btn.ok-btn.picked { background: var(--accent-dim); }
.score-btn.cl-btn { color: var(--yellow); border-color: var(--yellow); }
.score-btn.cl-btn:hover, .score-btn.cl-btn.picked { background: var(--yellow-dim); }
.score-btn.ng-btn { color: var(--red); border-color: var(--red); }
.score-btn.ng-btn:hover, .score-btn.ng-btn.picked { background: var(--red-dim); }

/* Session end */
.session-end {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; gap: 20px;
  padding: 40px 20px; text-align: center;
}
.session-end.show { display: flex; }

.se-icon { font-size: 52px; }
.se-title {
  font-family: var(--font-jp);
  font-size: 24px; font-weight: 700; color: var(--accent);
}
.se-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; width: 100%; max-width: 340px;
}
.se-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.se-stat-val {
  font-family: var(--font-en);
  font-size: 28px; font-weight: 700;
}
.se-stat-label { font-size: 10px; color: var(--text-muted); font-family: var(--font-en); letter-spacing: 1px; }
.se-msg { font-size: 13px; color: var(--text-dim); font-family: var(--font-jp); line-height: 1.6; }
.se-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.se-home-btn {
  padding: 13px 28px; border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text);
  font-family: var(--font-jp); font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.se-home-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
.se-restart-btn {
  padding: 13px 28px; border-radius: var(--radius);
  border: none;
  background: var(--accent); color: #0d0f0a;
  font-family: var(--font-jp); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.se-restart-btn:hover { filter: brightness(1.08); }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 9px 18px;
  font-family: var(--font-jp);
  font-size: 12px; color: var(--text);
  transition: transform 0.2s ease;
  z-index: 999; white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media (max-width: 400px) {
  .q-ja-main { font-size: 18px; }
  .en-text { font-size: 15px; }
  .ss-grid { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>
<body>

<!-- ══════════════════════════════
     HOME VIEW
══════════════════════════════ -->
<div id="homeView" class="view active">

  <div class="app-header">
    <div class="header-logo">EN·TRAINER</div>
    <div class="header-stats">
      <div class="hstat ok">
        <div class="hstat-val" id="h-ok">0</div>
        <div class="hstat-label">OK</div>
      </div>
      <div class="hstat ng">
        <div class="hstat-val" id="h-ng">0</div>
        <div class="hstat-label">NG</div>
      </div>
      <div class="hstat streak">
        <div class="hstat-val" id="h-streak">0</div>
        <div class="hstat-label">🔥</div>
      </div>
    </div>
  </div>

  <div class="home-top">
    <!-- Overall progress -->
    <div class="overall-progress">
      <div class="op-top">
        <div class="op-title">OVERALL PROGRESS</div>
        <div class="op-count" id="op-count">0 / 300</div>
      </div>
      <div class="op-bar-bg">
        <div class="op-bar-fill" id="op-fill" style="width:0%"></div>
      </div>
      <div class="op-legend">
        <div class="legend-item"><div class="legend-dot ok"></div>OK</div>
        <div class="legend-item"><div class="legend-dot close"></div>惜しい</div>
        <div class="legend-item"><div class="legend-dot ng"></div>NG</div>
        <div class="legend-item"><div class="legend-dot todo"></div>未回答</div>
      </div>
    </div>

    <!-- Filter & Review -->
    <div class="home-controls">
      <button class="filter-chip on-all" data-f="all" onclick="setFilter('all')">ALL</button>
      <button class="filter-chip" data-f="anime" onclick="setFilter('anime')">🎌 ANIME</button>
      <button class="filter-chip" data-f="entertainment_business" onclick="setFilter('biz')">💼 BUSINESS</button>
      <button class="review-chip disabled" id="reviewChip" onclick="startReview()">🔁 復習 <span id="reviewCount">0</span></button>
    </div>

    <!-- Start buttons -->
    <div class="start-btns">
      <button class="start-btn primary" onclick="startSession(9999)">
        <span class="start-icon">▶</span>
        最初から
        <span class="start-sub">START ALL</span>
      </button>
      <button class="start-btn resume-btn-home" id="resumeBtn" onclick="resumeSession()" style="display:none;">
        <span class="start-icon">↩</span>
        続きから
        <span class="start-sub">RESUME</span>
      </button>
    </div>
  </div>

  <!-- Question list -->
  <div class="section-header">
    ALL QUESTIONS <span class="section-count" id="listCount">0</span>
  </div>
  <div class="q-list" id="qList"></div>

</div>

<!-- ══════════════════════════════
     TRAIN VIEW
══════════════════════════════ -->
<div id="trainView" class="view">

  <div class="train-header">
    <button class="home-back-btn" onclick="pauseAndGoHome()" title="ホームへ">←</button>
    <div class="train-progress-wrap">
      <div class="train-progress-bar-bg">
        <div class="train-progress-bar-fill" id="t-prog-fill" style="width:0%"></div>
      </div>
      <div class="train-progress-text" id="t-prog-text">0 / 0</div>
    </div>
    <div class="train-session-stats">
      <div class="tsstat ok"><div class="tsstat-val" id="t-ok">0</div><div>OK</div></div>
      <div class="tsstat ng"><div class="tsstat-val" id="t-ng">0</div><div>NG</div></div>
    </div>
  </div>

  <div class="train-body">

    <!-- Question card -->
    <div class="q-card" id="qCard">
      <div class="q-card-tag" id="qCardTag">
        <span id="qTagLabel">—</span>
        <span class="tag-sub" id="qSubLabel"></span>
      </div>
      <div class="q-card-body">
        <div class="q-ja-main" id="qJa">
          読み込み中…
          <button class="q-ja-speak-btn" onclick="speakJa()" title="日本語を読み上げ">🔊</button>
        </div>
        <div class="mic-area">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
          <div class="mic-hint" id="micHint">TAP TO SPEAK</div>
          <div class="transcript" id="transcript"></div>
        </div>
      </div>
    </div>

    <!-- Reveal -->
    <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">▼ 模範解答を見る</button>

    <!-- Answer card -->
    <div class="answer-card" id="answerCard">
      <div class="answer-top">
        <div class="answer-top-label">✓ MODEL ANSWER</div>
        <button class="en-speak-btn" onclick="speakEn()" title="英語を読み上げ">🔊</button>
      </div>
      <div class="answer-body">
        <div class="en-text" id="enText"></div>
        <div class="score-row">
          <button class="score-btn ok-btn" onclick="scoreQ('ok', this)">
            <span class="score-icon">✅</span><span>OK</span>
          </button>
          <button class="score-btn cl-btn" onclick="scoreQ('close', this)">
            <span class="score-icon">🔶</span><span>惜しい</span>
          </button>
          <button class="score-btn ng-btn" onclick="scoreQ('ng', this)">
            <span class="score-icon">❌</span><span>NG</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Session end -->
    <div class="session-end" id="sessionEnd">
      <div class="se-icon">🎉</div>
      <div class="se-title">セッション完了！</div>
      <div class="se-stats">
        <div class="se-stat">
          <div class="se-stat-val" id="se-total" style="color:var(--text)">0</div>
          <div class="se-stat-label">TOTAL</div>
        </div>
        <div class="se-stat">
          <div class="se-stat-val" id="se-ok" style="color:var(--accent)">0</div>
          <div class="se-stat-label">OK</div>
        </div>
        <div class="se-stat">
          <div class="se-stat-val" id="se-ng" style="color:var(--red)">0</div>
          <div class="se-stat-label">NG</div>
        </div>
      </div>
      <div class="se-msg" id="se-msg"></div>
      <div class="se-btns">
        <button class="se-home-btn" onclick="goHome()">🏠 ホームへ</button>
        <button class="se-restart-btn" onclick="restartSameSession()">🔁 同じセッション</button>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
//  STATE
// ══════════════════════════════
let QUESTIONS = [];
let results   = {};   // { id: 'ok'|'close'|'ng' }
let streak    = 0;
let currentFilter = 'all';

// Session state
let session = {
  queue: [],       // array of question ids
  idx: 0,
  ok: 0, close: 0, ng: 0,
  isReview: false,
  savedQueue: null,
  savedIdx: 0,
};

let recognition = null;
let isRecording = false;
let answered    = false;

const STORAGE_KEY = 'en_trainer_v2';

// ══════════════════════════════
//  PERSIST
// ══════════════════════════════
function save() {
  const data = {
    results,
    streak,
    savedSession: session.savedQueue ? {
      queue: session.savedQueue,
      idx: session.savedIdx,
      isReview: session.isReview,
    } : null,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.results) results = d.results;
    if (d.streak)  streak  = d.streak;
    if (d.savedSession) {
      session.savedQueue = d.savedSession.queue;
      session.savedIdx   = d.savedSession.idx;
      session.isReview   = d.savedSession.isReview;
    }
  } catch(e) {}
}

// ══════════════════════════════
//  LOAD QUESTIONS
// ══════════════════════════════
async function init() {
  load();
  try {
    const res  = await fetch('question_bank.json');
    const data = await res.json();
    QUESTIONS  = data.questions;
  } catch(e) {
    // Fallback minimal set
    QUESTIONS = [
      {id:1,theme:"anime",sub_theme:"進撃の巨人",ja:"最終回は衝撃的すぎて言葉が出ませんでした。",en:"The final episode was so shocking that I was left speechless."},
      {id:2,theme:"anime",sub_theme:"呪術廻戦",ja:"五条悟の強さは圧倒的で、登場するだけで画面が締まります。",en:"Gojo Satoru's strength is overwhelming, and his mere presence tightens up every scene."},
      {id:3,theme:"entertainment_business",sub_theme:"配信",ja:"ストリーミングサービスの契約者数が急増しています。",en:"The number of streaming service subscribers is growing rapidly."},
    ];
  }
  renderHome();
  if (session.savedQueue) {
    document.getElementById('resumeBtn').style.display = '';
  }
}

// ══════════════════════════════
//  VIEWS
// ══════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showView('homeView');
  renderHome();
}

function pauseAndGoHome() {
  // Save current position
  if (session.queue.length > 0 && session.idx < session.queue.length) {
    session.savedQueue = [...session.queue];
    session.savedIdx   = session.idx;
    save();
    document.getElementById('resumeBtn').style.display = '';
    showToast('進捗を保存しました');
  }
  stopRecording();
  goHome();
}

// ══════════════════════════════
//  HOME RENDER
// ══════════════════════════════
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.className = 'filter-chip';
    if (b.dataset.f === f) {
      if (f === 'all')   b.classList.add('on-all');
      if (f === 'anime') b.classList.add('on-anime');
      if (f === 'biz')   b.classList.add('on-biz');
    }
  });
  renderHome();
}

function renderHome() {
  const filtered = currentFilter === 'all' ? QUESTIONS
    : QUESTIONS.filter(q => currentFilter === 'anime'
        ? q.theme === 'anime'
        : q.theme === 'entertainment_business');

  // Overall progress
  const answered = Object.keys(results).length;
  const pct = QUESTIONS.length ? (answered / QUESTIONS.length * 100) : 0;
  document.getElementById('op-fill').style.width  = pct + '%';
  document.getElementById('op-count').textContent = answered + ' / ' + QUESTIONS.length;

  // Header stats
  const okCount  = Object.values(results).filter(v => v === 'ok').length;
  const ngCount  = Object.values(results).filter(v => v === 'ng').length;
  document.getElementById('h-ok').textContent     = okCount;
  document.getElementById('h-ng').textContent     = ngCount;
  document.getElementById('h-streak').textContent = streak;

  // Review chip
  const ngIds = QUESTIONS.filter(q => results[q.id] === 'ng' || results[q.id] === 'close');
  const reviewCount = ngIds.length;
  document.getElementById('reviewCount').textContent = reviewCount;
  const rc = document.getElementById('reviewChip');
  rc.classList.toggle('disabled', reviewCount === 0);

  // List
  document.getElementById('listCount').textContent = filtered.length;
  const list = document.getElementById('qList');
  list.innerHTML = '';

  filtered.forEach((q, i) => {
    const st = results[q.id] || 'todo';
    const row = document.createElement('div');
    row.className = 'q-row status-' + st;
    row.onclick = () => startFromQuestion(q.id);

    const dot = q.theme === 'anime' ? 'dot-anime' : 'dot-biz';
    let badge = '';
    if (st === 'ok')    badge = '<span class="q-badge badge-ok">OK</span>';
    if (st === 'close') badge = '<span class="q-badge badge-close">惜しい</span>';
    if (st === 'ng')    badge = '<span class="q-badge badge-ng">NG</span>';
    if (st === 'todo')  badge = '<span class="q-badge badge-todo">—</span>';

    row.innerHTML = `
      <span class="q-num">${i+1}</span>
      <span class="q-theme-dot ${dot}"></span>
      <span class="q-ja">${q.ja}</span>
      ${badge}
    `;
    list.appendChild(row);
  });
}

// ══════════════════════════════
//  SESSION START
// ══════════════════════════════
function getPool() {
  if (currentFilter === 'all') return [...QUESTIONS];
  return QUESTIONS.filter(q =>
    currentFilter === 'anime'
      ? q.theme === 'anime'
      : q.theme === 'entertainment_business'
  );
}

function startSession(size) {
  const pool = getPool().sort(() => Math.random() - 0.5);
  const queue = pool.slice(0, Math.min(size, pool.length)).map(q => q.id);
  launchSession(queue, 0, false);
}

function startReview() {
  const ngIds = QUESTIONS
    .filter(q => results[q.id] === 'ng' || results[q.id] === 'close')
    .sort(() => Math.random() - 0.5)
    .map(q => q.id);
  if (!ngIds.length) return;
  launchSession(ngIds, 0, true);
}

function resumeSession() {
  if (!session.savedQueue) return;
  launchSession(session.savedQueue, session.savedIdx, session.isReview);
  session.savedQueue = null;
  document.getElementById('resumeBtn').style.display = 'none';
  save();
}

function startFromQuestion(qid) {
  // Start a session from this specific question, put it first
  const pool = getPool();
  const idx  = pool.findIndex(q => q.id === qid);
  if (idx < 0) return;
  const queue = [pool[idx], ...pool.filter((_,i) => i !== idx)].map(q => q.id);
  launchSession(queue, 0, false);
}

function launchSession(queue, startIdx, isReview) {
  session.queue    = queue;
  session.idx      = startIdx;
  session.ok       = 0;
  session.close    = 0;
  session.ng       = 0;
  session.isReview = isReview;
  session.savedQueue = null;

  // Hide session end, show cards
  document.getElementById('sessionEnd').classList.remove('show');
  document.getElementById('qCard').style.display = '';
  document.getElementById('revealBtn').style.display = '';
  showView('trainView');
  loadQ();
}

function restartSameSession() {
  const queue = [...session.queue].sort(() => Math.random() - 0.5);
  launchSession(queue, 0, session.isReview);
}

// ══════════════════════════════
//  LOAD QUESTION
// ══════════════════════════════
function getQ() {
  const id = session.queue[session.idx];
  return QUESTIONS.find(q => q.id === id);
}

function loadQ() {
  answered = false;
  stopRecording();

  // Reset UI
  document.getElementById('answerCard').classList.remove('show');
  document.getElementById('revealBtn').style.display = '';
  document.getElementById('transcript').classList.remove('show');
  document.getElementById('transcript').textContent = '';
  document.getElementById('micHint').textContent = 'TAP TO SPEAK';
  document.getElementById('micBtn').classList.remove('rec');
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('picked'));

  const q = getQ();
  if (!q) { showSessionEnd(); return; }

  // Progress
  const pct = session.idx / session.queue.length * 100;
  document.getElementById('t-prog-fill').style.width = pct + '%';
  document.getElementById('t-prog-text').textContent = (session.idx + 1) + ' / ' + session.queue.length;
  document.getElementById('t-ok').textContent = session.ok;
  document.getElementById('t-ng').textContent = session.ng;

  // Theme tag
  const tagEl = document.getElementById('qCardTag');
  const tagLbl = document.getElementById('qTagLabel');
  if (q.theme === 'anime') {
    tagEl.className = 'q-card-tag tag-anime';
    tagLbl.textContent = '🎌 ANIME';
  } else {
    tagEl.className = 'q-card-tag tag-biz';
    tagLbl.textContent = '💼 BUSINESS';
  }
  document.getElementById('qSubLabel').textContent = q.sub_theme || '';

  // Text
  document.getElementById('qJa').innerHTML =
    q.ja + ' <button class="q-ja-speak-btn" onclick="speakJa()" title="日本語を読み上げ">🔊</button>';
  document.getElementById('enText').textContent = q.en;

  // Auto-speak Japanese
  speakJa();
}

// ══════════════════════════════
//  TTS
// ══════════════════════════════
function speakJa() {
  const q = getQ(); if (!q) return;
  speak(q.ja, 'ja-JP', 0.9);
}

function speakEn() {
  const q = getQ(); if (!q) return;
  speak(q.en, 'en-US', 0.88);
}

function speak(text, lang, rate) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = rate;
  speechSynthesis.speak(u);
}

// ══════════════════════════════
//  MIC / STT
// ══════════════════════════════
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'en-US'; r.continuous = false; r.interimResults = true;

  r.onresult = e => {
    let fin = '', inter = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin   += e.results[i][0].transcript;
      else                       inter += e.results[i][0].transcript;
    }
    const box = document.getElementById('transcript');
    box.textContent = fin || inter;
    box.classList.add('show');
  };
  r.onend = () => stopRecording();
  r.onerror = () => { stopRecording(); showToast('マイクにアクセスできません'); };
  return r;
}

function toggleMic() {
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) { showToast('このブラウザは音声入力非対応です'); return; }
  try {
    recognition.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('rec');
    document.getElementById('micHint').textContent = '● REC...';
  } catch(e) {}
}

function stopRecording() {
  if (recognition && isRecording) try { recognition.stop(); } catch(e) {}
  isRecording = false;
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('micHint').textContent = 'TAP TO SPEAK';
}

// ══════════════════════════════
//  REVEAL & SCORE
// ══════════════════════════════
function revealAnswer() {
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('answerCard').classList.add('show');
  stopRecording();
}

function scoreQ(result, btn) {
  if (answered) return;
  answered = true;

  const q = getQ(); if (!q) return;

  results[q.id] = result;

  if (result === 'ok')    { session.ok++;    streak++; showToast('✅ Nice!'); }
  if (result === 'close') { session.close++; streak = 0; showToast('🔶 惜しい！'); }
  if (result === 'ng')    { session.ng++;    streak = 0; showToast('❌ 次頑張ろう'); }

  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  document.getElementById('h-streak').textContent = streak;
  save();

  // Auto-advance after short delay so user can see the flash
  setTimeout(() => nextQ(), 600);
}

// ══════════════════════════════
//  NEXT
// ══════════════════════════════
function nextQ() {
  session.idx++;
  if (session.idx >= session.queue.length) {
    showSessionEnd();
  } else {
    loadQ();
  }
}

// ══════════════════════════════
//  SESSION END
// ══════════════════════════════
function showSessionEnd() {
  document.getElementById('qCard').style.display    = 'none';
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('answerCard').classList.remove('show');

  const total = session.ok + session.close + session.ng;
  document.getElementById('se-total').textContent = total;
  document.getElementById('se-ok').textContent    = session.ok;
  document.getElementById('se-ng').textContent    = session.ng;

  const pct = total ? Math.round(session.ok / total * 100) : 0;
  const msg =
    pct === 100 ? '🔥 パーフェクト！素晴らしい！' :
    pct >= 80   ? '👏 とても良い成績です！' :
    pct >= 60   ? '💪 もう少し！続けよう！' :
                  '📚 復習モードで再チャレンジしよう！';
  document.getElementById('se-msg').textContent = `正答率 ${pct}% — ${msg}`;

  document.getElementById('sessionEnd').classList.add('show');
  save();
}

// ══════════════════════════════
//  TOAST
// ══════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ══════════════════════════════
//  BOOT
// ══════════════════════════════
init();
</script>
</body>
</html>
